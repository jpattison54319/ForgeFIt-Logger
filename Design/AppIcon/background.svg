<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- ForgeFit icon — BACKGROUND layer for Icon Composer.
       Slate obsidian gradient from the app's Sage theme (Theme.swift:
       surfaceElevated-ish top-left into background bottom-right).
       Flat art only: iOS renders the Liquid Glass treatment live. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C2129"/>
      <stop offset="1" stop-color="#0B0E13"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
</svg>
