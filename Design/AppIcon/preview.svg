<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- REFERENCE ONLY — approximates the assembled Liquid Glass look for
       design review. Do NOT ship this: it bakes a fake specular/sheen that
       would fight the system's live rendering. Ship background.svg +
       mark.svg through Icon Composer instead. -->
  <defs>
    <clipPath id="sq"><rect width="1024" height="1024" rx="230"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C2129"/><stop offset="1" stop-color="#0B0E13"/>
    </linearGradient>
    <linearGradient id="mk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ADFA0"/><stop offset="1" stop-color="#3F9A63"/>
    </linearGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <path id="mark" d="M260 274 L620 274 A40 40 0 0 1 660 314 L660 362 A40 40 0 0 1 620 402 L260 402 A40 40 0 0 1 220 362 L220 314 A40 40 0 0 1 260 274 Z
      M600 274 L656 274 C724 276 788 296 812 326 C824 340 814 356 794 362 L656 402 L600 402 Z
      M256 402 L424 402 C406 444 404 474 406 534 L406 664 C406 694 418 710 426 726 C434 742 426 754 408 754 L272 754 C254 754 246 742 254 726 C262 710 274 694 274 664 L274 534 C276 474 274 444 256 402 Z
      M276 510 L610 510 C636 510 652 522 660 544 L676 582 C684 602 670 622 648 622 L276 622 Z"/>
  </defs>
  <g clip-path="url(#sq)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <use href="#mark" fill="#000000" opacity="0.45" filter="url(#soft)" transform="translate(0,18)"/>
    <use href="#mark" fill="url(#mk)"/>
    <use href="#mark" fill="url(#spec)"/>
    <path d="M0 0 H1024 V320 C690 415 320 415 0 320 Z" fill="#FFFFFF" opacity="0.05"/>
  </g>
</svg>
