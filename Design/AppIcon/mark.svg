<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- ForgeFit icon — MARK layer for Icon Composer (transparent canvas).
       The Anvil-F: anvil face + right-facing horn as the F's top arm, the
       flared footing as the middle arm, and the anvil's concave throat
       extended downward as the single vertical stem, landing on a forged
       foot. One compound path, brand gradient fill (Fresh Mint -> Active
       Sage). No baked highlights or shadows — the system's Liquid Glass
       supplies specular, depth, and the dark/tinted/clear modes. -->
  <defs>
    <linearGradient id="mk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ADFA0"/>
      <stop offset="1" stop-color="#3F9A63"/>
    </linearGradient>
  </defs>
